displayName: Pet Care Veterinary Practise Management Application
description: The B2B application comprises three Ballerina services; email, channel, and pet management, where email and channel services connect to send emails. These services are deployed in WSO2 Developer Platform, functioning as APIs. The platform also hosts a React JS web app. Asgardeo is responsible for user authentication and improving the user experience through CIAM, while also supporting B2B application features.
